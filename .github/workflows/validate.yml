name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/rules.mjs validate
      - run: node tools/rules.mjs build
      - run: node tools/test_import_jsonl.mjs
      - run: git diff --exit-code -- dist
